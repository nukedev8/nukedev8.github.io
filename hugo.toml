baseURL = "https://nukedev8.github.io/"
title = "Nukedev"
languageCode = "en-us"
theme = "PaperMod"

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = true
    lineNumbersInTable = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menus.main]]
  name = "Projects"
  url = "/projects/"
  weight = 20

[[menus.main]]
  name = "Search"
  url = "/search/"
  weight = 30

[params]
  env = "production"
  defaultTheme = "auto"
  disableThemeToggle = false
  DateFormat = "January 2, 2006"
  ShowReadingTime = true
  ShowWordCount = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  fuseOpts.isCaseSensitive = false
  fuseOpts.shouldSort = true
  fuseOpts.threshold = 0.4
  fuseOpts.minMatchCharLength = 2
  fuseOpts.keys = ["title", "permalink", "summary", "content"]

  [params.profileMode]
    enabled = true
    title = "I'm Brian"
    subtitle = "Full Stack Software Engineer"
    imageUrl = "https://github.com/nukedev8.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = ""

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects/"

    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nukedev8"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/yourhandle"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourhandle"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    text = "Nukedev"
